---
name: Thunderbird Android Build Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    strategy:
      matrix:
        runner: [ubuntu22.04-v8, ubuntu22.04-v16]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    steps:
      - name: Checkout thunderbird-android @ b667b70e8d
        uses: actions/checkout@v4                                                                                                                 
        with:         
          repository: thunderbird/thunderbird-android                                                                                             
          ref: 6c32c95f9d09e5f28d88d7886536f3ae5889ed3c #THUNDERBIRD_17_0b4 

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (no cache)
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      - name: Fix gradle.properties (Gradle 9.2.1 comma separator bug)
        run: sed -i '/org\.gradle\.jvmargs/s/,-/ -/g' gradle.properties

      - name: Cold build
        run: ./gradlew assembleFossBeta --no-build-cache --no-configuration-cache --no-daemon

      - name: Warm build
        run: ./gradlew assembleFossBeta --no-build-cache --no-configuration-cache --no-daemon --rerun-tasks
